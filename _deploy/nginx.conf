# ============================================================
#  Nginx Config for tuitionsinindia.com
#  Location on VPS: /etc/nginx/sites-available/tuitionsinindia
#  After uploading, run:
#    sudo ln -s /etc/nginx/sites-available/tuitionsinindia /etc/nginx/sites-enabled/
#    sudo nginx -t
#    sudo systemctl reload nginx
# ============================================================

# Redirect www → non-www (HTTP)
server {
    listen 80;
    server_name www.tuitionsinindia.com;
    return 301 https://tuitionsinindia.com$request_uri;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name tuitionsinindia.com;
    return 301 https://tuitionsinindia.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name tuitionsinindia.com www.tuitionsinindia.com;

    # ------------------------------------------------------------
    # SSL — Let's Encrypt (certbot fills these in automatically)
    # Run: certbot --nginx -d tuitionsinindia.com -d www.tuitionsinindia.com
    # ------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/tuitionsinindia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tuitionsinindia.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------
    add_header X-Frame-Options        "SAMEORIGIN"                    always;
    add_header X-XSS-Protection       "1; mode=block"                 always;
    add_header X-Content-Type-Options "nosniff"                       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ------------------------------------------------------------
    # Gzip compression
    # ------------------------------------------------------------
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css text/xml application/json
                    application/javascript application/xml+rss
                    application/atom+xml image/svg+xml;

    # ------------------------------------------------------------
    # Max upload size (for profile photos, KYC documents etc.)
    # ------------------------------------------------------------
    client_max_body_size 10M;

    # ------------------------------------------------------------
    # Proxy to Next.js Docker container (port 3006)
    # ------------------------------------------------------------
    location / {
        proxy_pass         http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Long-lived cache for Next.js static assets (hashed filenames)
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3006;
        add_header         Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header   Host $host;
    }

    # Cache public images / fonts
    location /public/ {
        proxy_pass       http://127.0.0.1:3006;
        add_header       Cache-Control "public, max-age=86400";
    }
}

version: '3.8'

# Staging environment — tuitionsinindia.in
# Runs alongside production on the same VPS, different ports + isolated DB
# Deploy with: ./deploy-staging.sh

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ENV: staging
    container_name: tuitionsinindia-staging-web
    restart: always
    ports:
      - "3007:3000"   # Staging on 3007; map this in Nginx for tuitionsinindia.in
    env_file:
      - .env.staging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
    networks:
      - tuitions-staging-network

  db:
    image: postgres:15-alpine
    container_name: tuitionsinindia-staging-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tuitions_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-staging_password_here}
      POSTGRES_DB: ${POSTGRES_DB:-tuitionsinindia_staging}
    volumes:
      - tuitions_staging_pgdata:/var/lib/postgresql/data
    networks:
      - tuitions-staging-network

networks:
  tuitions-staging-network:
    driver: bridge

volumes:
  tuitions_staging_pgdata:

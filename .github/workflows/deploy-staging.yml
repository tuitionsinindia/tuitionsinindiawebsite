name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    name: Deploy → tuitionsinindia.in
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          timeout: 600s
          script: |
            set -e
            cd /root/tuitionsinindia-staging

            echo "📥 Pulling latest staging code from GitHub..."
            git fetch origin staging
            git reset --hard origin/staging

            echo "📋 Writing version info..."
            cat > /root/tuitionsinindia-staging/version.json << EOF
            {
              "sha": "${{ github.sha }}",
              "shortSha": "$(echo ${{ github.sha }} | cut -c1-7)",
              "branch": "staging",
              "message": "${{ github.event.head_commit.message }}",
              "author": "${{ github.event.head_commit.author.name }}",
              "deployedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "env": "staging"
            }
            EOF

            echo "🐳 Building and starting staging containers..."
            cp .env.staging .env.production
            docker compose -f docker-compose.staging.yml build \
              --no-cache \
              --build-arg CACHE_BUST=$(date +%s) \
              --build-arg GIT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            docker compose -f docker-compose.staging.yml up -d

            echo "🗄️ Syncing DB schema..."
            DB_PASS=$(grep '^POSTGRES_PASSWORD=' .env.staging | cut -d= -f2 | tr -d '"')
            DB_USER=$(grep '^POSTGRES_USER=' .env.staging | cut -d= -f2 | tr -d '"')
            DB_NAME=$(grep '^POSTGRES_DB=' .env.staging | cut -d= -f2 | tr -d '"')
            docker exec tuitionsinindia-staging-db psql -U $DB_USER -d $DB_NAME \
              -c "ALTER USER $DB_USER WITH PASSWORD '$DB_PASS';" 2>/dev/null || true
            docker exec tuitionsinindia-staging-web prisma db push \
              --accept-data-loss --skip-generate 2>&1 | grep -v "Can't write to"

            echo "📝 Logging deployment..."
            mkdir -p /root/deploy-history
            ENTRY="{\"sha\":\"$(echo ${{ github.sha }} | cut -c1-7)\",\"branch\":\"staging\",\"message\":\"${{ github.event.head_commit.message }}\",\"author\":\"${{ github.event.head_commit.author.name }}\",\"deployedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"env\":\"staging\",\"status\":\"success\"}"
            echo "$ENTRY" >> /root/deploy-history/staging.log

            echo "🧹 Pruning old images..."
            docker image prune -f

            echo "✅ Staging deploy complete! → https://tuitionsinindia.in"
